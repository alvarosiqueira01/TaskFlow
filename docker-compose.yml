version: '3.8'

services:
  # 1. Database (Aurora PostgreSQL Equivalent)
  postgres:
    image: postgres:15-alpine
    container_name: taskflow-db
    environment:
      POSTGRES_USER: postgres_admin
      POSTGRES_PASSWORD: local_password
      POSTGRES_DB: taskflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - taskflow-net

  # 2. LocalStack (S3, EventBridge, Secrets Manager Equivalent)
  localstack:
    image: localstack/localstack:latest
    container_name: taskflow-localstack
    environment:
      - SERVICES=s3,events,secretsmanager
      - DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - DOCKER_HOST=unix:///var/run/docker.sock
    ports:
      - "4566:4566"
    volumes:
      - "${LOCALSTACK_VOLUME_DIR:-./.localstack}:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./scripts/localstack-init.sh:/etc/localstack/init/ready.d/init.sh" # Auto-creates S3 buckets
    networks:
      - taskflow-net

  # 3. API Gateway Emulator (Nginx)
  api-gateway:
    image: nginx:alpine
    container_name: taskflow-api-gateway
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - tasks-service
      - media-service
    networks:
      - taskflow-net

  # 4. Frontend (Vue.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: taskflow-frontend
    ports:
      - "3000:3000" # Vite default port
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
    networks:
      - taskflow-net

  # 5. Microservices (Using a generic Dockerfile + Hot Reload)
  auth-service:
    <<: &backend-service
      build:
        context: .
        dockerfile: Dockerfile.dev
      environment:
        NODE_ENV: development
        DB_HOST: postgres
        DB_PORT: 5432
        DB_NAME: taskflow
        DB_USER: postgres_admin
        DB_PASSWORD: local_password
        AWS_ENDPOINT_URL: http://localstack:4566
        AWS_ACCESS_KEY_ID: test
        AWS_SECRET_ACCESS_KEY: test
        AWS_REGION: us-east-1
        EVENT_BUS_NAME: taskflow-bus-local
        PORT: 3000
      volumes:
        - ./backend:/app/backend
        - /app/backend/node_modules
      networks:
        - taskflow-net
    container_name: taskflow-auth
    command: npm run dev:local --workspace=backend/services/auth

  tasks-service:
    <<: *backend-service
    container_name: taskflow-tasks
    command: npm run dev:local --workspace=backend/services/tasks

  media-service:
    <<: *backend-service
    container_name: taskflow-media
    environment:
      <<: *backend-service.environment
      MEDIA_BUCKET_NAME: taskflow-media-local
    command: npm run dev:local --workspace=backend/services/media

  categories-service:
    <<: *backend-service
    container_name: taskflow-categories
    command: npm run dev:local --workspace=backend/services/categories

  collaboration-service:
    <<: *backend-service
    container_name: taskflow-collaboration
    command: npm run dev:local --workspace=backend/services/collaboration

  notifications-service:
    <<: *backend-service
    container_name: taskflow-notifications
    command: npm run dev:local --workspace=backend/services/notifications

  reports-service:
    <<: *backend-service
    container_name: taskflow-reports
    command: npm run dev:local --workspace=backend/services/reports

networks:
  taskflow-net:
    driver: bridge

volumes:
  pgdata: